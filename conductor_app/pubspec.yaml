name: conductor_app
description: AHC Tours Conductor Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  cupertino_icons: ^1.0.6
  
  # Core packages
  mobile_scanner: ^4.0.1
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  http: ^1.2.0
  
  # UI & Utils
  google_fonts: ^6.1.0
  intl: ^0.19.0
  fluttertoast: ^8.2.4
  connectivity_plus: ^5.0.2
  permission_handler: ^11.2.0
  vibration: ^1.8.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true